---
# Shared Zammad ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: zammad-config
  namespace: itsm
data:
  POSTGRESQL_HOST: zammad-postgresql
  POSTGRESQL_DB: zammad_production
  POSTGRESQL_USER: zammad
  POSTGRESQL_PASS: zammad
  REDIS_URL: redis://zammad-redis:6379
  MEMCACHE_SERVERS: zammad-memcached:11211
  ELASTICSEARCH_ENABLED: "false"
  NGINX_PORT: "8080"
  TZ: Asia/Shanghai
  ZAMMAD_RAILSSERVER_PORT: "3000"
  ZAMMAD_WEBSOCKET_PORT: "6042"
  NGINX_PORT: "8080"
  TZ: Asia/Shanghai
  ZAMMAD_HTTP_TYPE: "IPv4"
---
# PersistentVolumeClaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zammad-postgresql-pvc
  namespace: itsm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zammad-redis-pvc
  namespace: itsm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zammad-storage-pvc
  namespace: itsm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zammad-backup-pvc
  namespace: itsm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad-postgresql
  namespace: itsm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad-postgresql
  template:
    metadata:
      labels:
        app: zammad-postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:17.9-alpine
        env:
        - name: POSTGRES_DB
          value: zammad_production
        - name: POSTGRES_USER
          value: zammad
        - name: POSTGRES_PASSWORD
          value: zammad
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: zammad-postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: zammad-postgresql
  namespace: itsm
spec:
  selector:
    app: zammad-postgresql
  ports:
  - port: 5432
    targetPort: 5432
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad-redis
  namespace: itsm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad-redis
  template:
    metadata:
      labels:
        app: zammad-redis
    spec:
      containers:
      - name: redis
        image: redis:8.6.2-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: zammad-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: zammad-redis
  namespace: itsm
spec:
  selector:
    app: zammad-redis
  ports:
  - port: 6379
    targetPort: 6379
---
# Memcached
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad-memcached
  namespace: itsm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad-memcached
  template:
    metadata:
      labels:
        app: zammad-memcached
    spec:
      containers:
      - name: memcached
        image: memcached:1.6.41-alpine
        command: ["memcached", "-m", "64M"]
        ports:
        - containerPort: 11211
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 96Mi
        readinessProbe:
          tcpSocket:
            port: 11211
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zammad-memcached
  namespace: itsm
spec:
  selector:
    app: zammad-memcached
  ports:
  - port: 11211
    targetPort: 11211
---
# Zammad Init Job
apiVersion: batch/v1
kind: Job
metadata:
  name: zammad-init
  namespace: itsm
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: zammad-init
        image: ghcr.io/zammad/zammad:7.0.1-0024
        args: ["zammad-init"]
        envFrom:
        - configMapRef:
            name: zammad-config
        volumeMounts:
        - name: storage
          mountPath: /opt/zammad/storage
        - name: backup
          mountPath: /var/tmp/zammad
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: zammad-storage-pvc
      - name: backup
        persistentVolumeClaim:
          claimName: zammad-backup-pvc
